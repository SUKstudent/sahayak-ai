<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Sahayak AI - Climate Resilient Livelihood Planner</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="header">
        <h1>🌾 Sahayak AI</h1>
        <p>Climate-Resilient Livelihood Planner for North Karnataka Farmers</p>
    </div>

    <div class="container">
        <div class="tabs">
            <button class="tab active" data-tab="form">📝 Farmer Details</button>
            <button class="tab" data-tab="soil">📸 Soil Analysis</button>
            <button class="tab" data-tab="schemes">🏦 Government Schemes</button>
        </div>

        <!-- Form Tab -->
        <div id="formTab" class="tab-content active">
            <div class="card">
                <div class="lang-buttons">
                    <button class="lang-btn active" data-lang="english">🇬🇧 English</button>
                    <button class="lang-btn" data-lang="kannada">🇮🇳 ಕನ್ನಡ</button>
                </div>

                <div class="form-group">
                    <label id="label-land">🌍 Land Size (acres)</label>
                    <input type="number" id="land" step="0.5" placeholder="e.g., 2.5">
                </div>

                <div class="form-group">
                    <label id="label-water">💧 Water Availability</label>
                    <select id="water">
                        <option value="low">Low / ಕಡಿಮೆ</option>
                        <option value="moderate">Moderate / ಮಧ್ಯಮ</option>
                        <option value="high">High / ಹೆಚ್ಚು</option>
                    </select>
                </div>

                <div class="form-group">
                    <label id="label-budget">💰 Budget (₹)</label>
                    <input type="number" id="budget" placeholder="e.g., 25000">
                </div>

                <div class="form-group">
                    <label id="label-skills">👨‍👩‍👧‍👦 Family Skills</label>
                    <div class="skills-grid" id="skillsGrid"></div>
                </div>

                <button class="btn-primary" id="submitBtn">🔍 Get Recommendations</button>
            </div>
        </div>

        <!-- Soil Tab -->
        <div id="soilTab" class="tab-content">
            <div class="card">
                <div class="lang-buttons">
                    <button class="lang-btn active" data-lang="english">🇬🇧 English</button>
                    <button class="lang-btn" data-lang="kannada">🇮🇳 ಕನ್ನಡ</button>
                </div>

                <div class="upload-area" id="uploadArea">
                    <p id="upload-text">📸 Click to upload soil photo</p>
                    <input type="file" id="soilImage" accept="image/*" style="display: none">
                    <img id="imagePreview" class="image-preview" style="display: none">
                </div>

                <div class="form-group">
                    <label id="soil-label-land">🌍 Land Size (acres)</label>
                    <input type="number" id="soil-land" step="0.5" placeholder="e.g., 2.5">
                </div>

                <div class="form-group">
                    <label id="soil-label-budget">💰 Budget (₹)</label>
                    <input type="number" id="soil-budget" placeholder="e.g., 25000">
                </div>

                <div class="form-group">
                    <label id="soil-label-skills">👨‍👩‍👧‍👦 Family Skills</label>
                    <div class="skills-grid" id="soilSkillsGrid"></div>
                </div>

                <button class="btn-primary" id="soilBtn">📸 Analyze Soil</button>
            </div>
        </div>

        <!-- Schemes Tab -->
        <div id="schemesTab" class="tab-content">
            <div class="card">
                <div class="lang-buttons">
                    <button class="lang-btn active" data-lang="english">🇬🇧 English</button>
                    <button class="lang-btn" data-lang="kannada">🇮🇳 ಕನ್ನಡ</button>
                </div>
                <div id="schemesList" class="schemes-container"></div>
            </div>
        </div>

        <div id="results"></div>
    </div>

    <!-- Arya Voice Assistant -->
    <button class="arya-btn" id="aryaBtn">🤖</button>
    <div class="arya-chat" id="aryaChat">
        <div class="arya-header">
            <span>🤖 ಆರ್ಯ - Your Assistant</span>
            <button class="arya-close">✕</button>
        </div>
        <div class="arya-messages" id="aryaMessages">
            <div class="message arya-msg">
                🤖 Namaste! I am Arya, your farming assistant.<br>
                Ask me about crops, livestock, Bidri work, or subsidies!
            </div>
        </div>
        <div class="arya-mic">
            <button class="mic-btn" id="micBtn">🎤 Press and Speak</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
